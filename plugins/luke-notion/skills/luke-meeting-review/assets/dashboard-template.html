<style>
  :root {
    --bg: #0b0d12;

    --panel-2: #1a1f2e;
    --border: #252b3d;
    --text: #e5e7eb;
    --muted: #8b94a8;
    --accent: #7c9eff;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --pink: #ec4899;
  }
  body { background: var(--bg); color: var(--text); font-family: 'SF Mono', ui-monospace, monospace; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; }
  .panel-2 { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; }
  .pill { padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .pill-green { background: rgba(52,211,153,.15); color: var(--green); }
  .pill-yellow { background: rgba(251,191,36,.15); color: var(--yellow); }
  .pill-red { background: rgba(248,113,113,.15); color: var(--red); }
  .pill-blue { background: rgba(124,158,255,.15); color: var(--accent); }
  .pill-gray { background: rgba(139,148,168,.15); color: var(--muted); }
  [contenteditable="true"] { outline: none; border-bottom: 1px dashed transparent; }
  [contenteditable="true"]:hover { border-bottom: 1px dashed var(--muted); }
  [contenteditable="true"]:focus { border-bottom: 1px dashed var(--accent); background: rgba(124,158,255,.05); }
  .task-row { transition: opacity .2s, background .2s; }
  .task-row.dropped { opacity: .3; text-decoration: line-through; }
  details summary { cursor: pointer; user-select: none; }
  details summary::-webkit-details-marker { display: none; }
  details summary::before { content: '▸'; display: inline-block; margin-right: 6px; transition: transform .15s; color: var(--muted); }
  details[open] summary::before { transform: rotate(90deg); }
  .queue-item { transition: background .15s; }
  .queue-item:hover { background: var(--panel-2); }
  .queue-item.active { background: rgba(124,158,255,.12); border-left: 3px solid var(--accent); }
  .queue-item.done { opacity: .55; }
  .queue-item.done .queue-num { color: var(--green); }
  .queue-item.skipped .queue-num { color: var(--muted); }
  .queue-num { font-weight: 700; color: var(--muted); width: 24px; display: inline-block; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  .progress-ring { transform: rotate(-90deg); }
  .btn { padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; border: 1px solid transparent; }
  .btn-primary { background: var(--accent); color: #0b0d12; }
  .btn-primary:hover { background: #9bb4ff; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-ghost:hover { background: var(--panel-2); }
  .btn-danger { background: transparent; border: 1px solid rgba(248,113,113,.4); color: var(--red); }
  .btn-danger:hover { background: rgba(248,113,113,.1); }
  .decision-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 700; letter-spacing: .5px; }
  .work-bearing { background: rgba(236,72,153,.15); color: var(--pink); }
  .info-only { background: rgba(139,148,168,.15); color: var(--muted); }
  .session-note { font-size: 11px; color: var(--muted); }
  input[type="text"], select, textarea {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; color: var(--text); font-family: inherit; font-size: 13px;
  }
  textarea { width: 100%; min-height: 60px; resize: vertical; }
  input[type="text"]:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  .header-grad {
    background: linear-gradient(135deg, rgba(124,158,255,.08), rgba(236,72,153,.04));
  }
</style>
</head>

          <span id="state-summary">${m.tasks.length} tasks staged · ready to commit when you click "approve"</span>
        </div>
        <div class="flex gap-2">
          <button class="btn btn-danger" onclick="markSkipped()">Skip meeting</button>
          <button class="btn btn-ghost" onclick="window.__USER_NOTE = prompt('Add a note for Claude:'); window.__STATE = 'note'">Send note to Claude</button>
          <button class="btn btn-primary" onclick="approveMeeting()">✓ Approve & continue to next</button>
        </div>
      </div>
    `;

    // Right pane: raw AI summary
    document.getElementById('ai-raw').innerHTML = m.ai_summary_raw
      .split('\n')
      .map(line => {
        if (line.startsWith('### ')) return `<div class="font-semibold text-[var(--accent)] mt-3">${line.slice(4)}</div>`;
        if (line.startsWith('- ')) return `<div class="ml-2 text-[var(--muted)]">${line}</div>`;
        return line ? `<div class="text-[var(--muted)]">${line}</div>` : '';
      })
      .join('');
  }

  // ============== INTERACTIONS ==============
  window.toggleWorkBearing = (sIdx, dIdx) => {
    const d = window.MEETING_1.sections[sIdx].decisions[dIdx];
    d.work_bearing = !d.work_bearing;
    renderMeeting(window.MEETING_1);
  };

  window.toggleTask = (tIdx, checked) => {
    document.getElementById('task-' + tIdx).classList.toggle('dropped', !checked);
    window.MEETING_1.tasks[tIdx].dropped = !checked;
    const kept = window.MEETING_1.tasks.filter(t => !t.dropped).length;
    document.getElementById('state-summary').textContent = `${kept} tasks staged · ready to commit when you click "approve"`;
  };

  window.addTask = () => {
    const title = prompt("Task title?");
    if (!title) return;
    window.MEETING_1.tasks.push({
      keep_status: "green", title, initiative: window.MEETING_1.triage.initiative_primary,
      priority: "P2", status: "To Do", assignee: "Collin", source: "review-conversation",
      notes: "Added during review.",
    });
    renderMeeting(window.MEETING_1);
  };

  window.markSkipped = () => {
    window.__STATE = 'skipped';
    window.__SKIP_TITLE = window.MEETING_1.triage.title;
    document.getElementById('state-summary').innerHTML = '<span class="text-[var(--red)]">⊘ skip flag set — Claude will pick this up on next poll</span>';
  };

  window.approveMeeting = () => {
    // Capture all edits from contenteditable
    document.querySelectorAll('[contenteditable="true"]').forEach(el => {
      const field = el.dataset.field;
      if (field === 'triage.title') window.MEETING_1.triage.title = el.textContent.trim();
      if (field === 'triage.summary') window.MEETING_1.triage.summary = el.textContent.trim();
      if (el.dataset.section !== undefined && el.dataset.decision !== undefined) {
        window.MEETING_1.sections[el.dataset.section].decisions[el.dataset.decision].text = el.textContent.trim();
      }
      if (el.dataset.section !== undefined && el.dataset.context !== undefined) {
        window.MEETING_1.sections[el.dataset.section].context[el.dataset.context] = el.textContent.trim().replace(/^—\s*/, '');
      }
      if (el.dataset.task !== undefined) {
        const tIdx = +el.dataset.task;
        if (el.dataset.tfield === 'title') window.MEETING_1.tasks[tIdx].title = el.textContent.trim();
        if (el.dataset.tfield === 'notes') window.MEETING_1.tasks[tIdx].notes = el.textContent.trim();
      }
    });
    window.__STATE = 'approved';
    window.__APPROVED_PAYLOAD = JSON.parse(JSON.stringify(window.MEETING_1));
    document.getElementById('state-summary').innerHTML = '<span class="text-[var(--green)]">✓ approved — Claude will write draft + commit on next poll</span>';
  };

  // ============== PERSISTENCE ==============
  const LS_KEY = 'meeting_review_session_efe3620c';
  function saveState() {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({
        MEETING_1: window.MEETING_1,
        SESSION: window.SESSION,
        __STATE: window.__STATE || null,
        __USER_NOTE: window.__USER_NOTE || null,
        __APPROVED_PAYLOAD: window.__APPROVED_PAYLOAD || null,
        savedAt: new Date().toISOString(),
      }));
    } catch (e) { console.error('save failed', e); }
  }
  function loadState() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return false;
      const s = JSON.parse(raw);
      if (s.MEETING_1) window.MEETING_1 = s.MEETING_1;
      if (s.SESSION) window.SESSION = s.SESSION;
      if (s.__STATE) window.__STATE = s.__STATE;
      if (s.__USER_NOTE) window.__USER_NOTE = s.__USER_NOTE;
      if (s.__APPROVED_PAYLOAD) window.__APPROVED_PAYLOAD = s.__APPROVED_PAYLOAD;
      return true;
    } catch (e) { return false; }
  }
  // Auto-save on any change
  document.addEventListener('click', () => setTimeout(saveState, 100));
  document.addEventListener('input', () => setTimeout(saveState, 200));
  setInterval(saveState, 5000); // safety net

  // ============== INIT ==============
  loadState();
  renderQueue();
  updateProgress();
  renderMeeting(window.MEETING_1);

  // hook queue clicks (just visual for now)
  document.getElementById('queue').addEventListener('click', e => {
    const li = e.target.closest('.queue-item');
    if (!li) return;
    window.__JUMP_TO = +li.dataset.idx;
  });
</script>
</body>
</html>
